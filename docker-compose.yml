services:
  app:
    build: .
    container_name: smartlab_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

  db:
    image: mysql:8.0
    container_name: smartlab_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: smartlab_db
      MYSQL_USER: smartlab_user
      MYSQL_PASSWORD: smartlab_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "smartlab_user", "-psmartlab_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
